{% extends 'base.html' %}
{% block title %}Criar Conta - SuaLoja{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
        <div class="card p-5 shadow-lg">
            <div class="text-center mb-4">
                <h1 class="display-6 fw-bold text-glow"><i class="fas fa-user-plus"></i> Criar Conta</h1>
                <p class="text-muted">Comece a comprar as melhores roupas agora</p>
            </div>

            <form method="post">
                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit" class="btn btn-primary w-100 mt-4 py-3">
                    <i class="fas fa-user-plus"></i> Criar minha conta
                </button>
            </form>

            <div class="text-center mt-4">
                <p>
                    Já tem conta? 
                    <a href="{% url 'accounts:login' %}" class="text-info fw-bold">Entrar aqui</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
