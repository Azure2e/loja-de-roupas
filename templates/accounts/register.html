{% extends 'base.html' %}
{% block title %}Criar Conta - SuaLoja{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
            <div class="card bg-dark border-0 shadow-lg p-5 text-white">
                <div class="text-center mb-4">
                    <h1 class="display-6 fw-bold text-glow">
                        <i class="fas fa-user-plus"></i> Criar Conta
                    </h1>
                    <p class="text-muted">Comece a comprar as melhores roupas agora</p>
                </div>

                <form method="post">
                    {% csrf_token %}

                    {{ form.as_p }}

                    <button type="submit" class="btn btn-primary btn-lg w-100 mt-4 py-3 fw-bold">
                        <i class="fas fa-user-plus"></i> Criar minha conta
                    </button>
                </form>

                <div class="text-center mt-4">
                    <p class="mb-0">
                        Já tem uma conta? 
                        <a href="{% url 'accounts:login' %}" class="text-info fw-bold text-decoration-none">
                            Entrar aqui
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
