{% extends 'base.html' %}
{% block title %}Nova senha{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4 bg-dark text-white">
                <h3 class="text-center mb-4">Crie uma nova senha</h3>
                
                <form method="post" autocomplete="off" novalidate>
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-success w-100 mt-3 py-2">Alterar senha</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
