{% extends 'base.html' %}
{% block title %}Login - SuaLoja{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-lg-5 col-md-7 col-sm-10">
        
        <div class="card p-5 shadow-lg">
            
            <!-- Cabeçalho com ícone -->
            <div class="text-center mb-4">
                <h1 class="display-6 fw-bold text-glow">
                    <i class="fas fa-user-circle fa-2x mb-3"></i><br>
                    Entrar
                </h1>
                <p class="text-muted">Bem-vindo de volta à sua loja de roupas favorita</p>
            </div>

            <!-- Formulário de Login -->
            <form method="post">
                {% csrf_token %}

                <!-- Django renderiza os campos automaticamente -->
                {{ form.as_p }}

                <!-- Botão de Login -->
                <button type="submit" class="btn btn-primary w-100 mt-4 py-3 fs-5">
                    <i class="fas fa-sign-in-alt me-2"></i> 
                    Entrar na Loja
                </button>
            </form>

            <!-- Links extras -->
            <div class="text-center mt-4">
                <p class="mb-1">
                    Não tem conta ainda? 
                    <a href="{% url 'accounts:register' %}" class="text-info fw-bold">
                        Criar conta agora
                    </a>
                </p>
                <a href="#" class="text-muted small">
                    Esqueci minha senha
                </a>
            </div>

        </div>
    </div>
</div>
{% endblock %}
