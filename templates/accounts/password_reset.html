{% extends 'base.html' %}
{% block title %}Esqueci minha senha{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4 bg-dark text-white">
                <h3 class="text-center mb-4">Esqueci minha senha</h3>
                <p class="text-center text-muted">Digite seu e-mail para receber o link de recuperação.</p>
                
                <form method="post" autocomplete="off" novalidate>
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100 mt-3 py-2">Enviar link de recuperação</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
