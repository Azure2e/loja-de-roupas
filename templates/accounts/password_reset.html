{% extends 'base.html' %}
{% block title %}Reset de Senha{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-5">
            <h2 class="text-center mb-4">Esqueceu sua senha?</h2>
            <p class="text-center mb-4">Digite seu e-mail e enviaremos um link para redefinir.</p>
            
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary w-100 py-3">Enviar link de recuperação</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
