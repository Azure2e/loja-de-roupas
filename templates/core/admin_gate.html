{% extends 'base.html' %}
{% block title %}Senha do Admin - SuaLoja{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card bg-dark border-primary">
                <div class="card-body p-5 text-center">
                    <h2 class="text-glow mb-4"><i class="fas fa-key"></i> Acesso Restrito</h2>
                    <p class="text-muted">Digite a senha master para entrar no painel administrativo</p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <input type="password" name="master_password" class="form-control form-control-lg text-center" 
                                   placeholder="Senha Master" autocomplete="off" required>
                        </div>
                        <button type="submit" class="btn btn-success btn-lg w-100">
                            <i class="fas fa-unlock"></i> Entrar no Admin
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
